apiVersion: apps/v1
kind: Deployment
metadata:
  name: projet-devops-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: projet-devops-app
  template:
    metadata:
      labels:
        app: projet-devops-app
    spec:
      containers:
        - name: app
          image: iraoui9/projet-devops:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: DB_HOST
              value: mysql
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
